<div class="chat-btn"><a href="tel:010-4167-6207" style="color:white;">전화 상담</a></div>

<script src="js/jquery-4.0.0.min.js"></script>
<script src="js/sweetalert2@11.min.js"></script>

<script>
  var pricePerBottle = 6000;

  $("#numberOfDispensers, #areas").change(function() {
    var selected_area = $("#areas option:selected").val();
    var numberOfDispensers = $("#numberOfDispensers option:selected").val();

    if(selected_area !== ""){
      if(numberOfDispensers === "") {
        //openToast("냉온수기 대수를 선택해 주십시오.", "error");
        $("#numberOfDispensers").focus();
      }else{
        var numberOfBottles = numberOfDispensers * 3;
        $("#numberOfBottles").children().remove();
        $("#numberOfBottles").html("<option value=''>약정 통수</option><option value='"+numberOfBottles+"'>"+numberOfBottles+"통</option>");
        $("#numberOfBottles").val(numberOfBottles).change();
        $("#calc_btn").text("월 예상 요금: "+ (numberOfBottles * pricePerBottle).toLocaleString() + "원 상담 신청 ▶");
      }
    }/*else{
      openToast('지역을 선택해 주십시오.', "error")
      $("#areas").focus();
    }*/
  });

  $("#calc_btn").click(function(){
    var selected_area = $("#areas option:selected").val();
    var numberOfDispensers = $("#numberOfDispensers option:selected").val();
    var numberOfBottles = $("#numberOfBottles option:selected").val();

    if(selected_area ==="" || numberOfBottles === "" || numberOfDispensers === ""){
      openToast("모든 항목은 필수로 선택해 주십시오.", "error");
    }else{
      location.href="#consult_btn";
    }
  });

  $("#consult_btn").click(function(){
    var selected_area = $("#areas option:selected").val();
    var selected_area_nm = $("#areas option:selected").text();
    var numberOfDispensers = $("#numberOfDispensers option:selected").val() + "대";
    var numberOfBottles = $("#numberOfBottles option:selected").val() + "통";
    var nameOfPersonInCharge = $("#nameOfPersonInCharge").val();
    var nameOfCompany = $("#nameOfCompany").val();
    var telNumber = $("#telNumber").val();

    /*if(selected_area === ""){
      openToast("지역을 선택해 주십시오", "error");
      $("#areas").focus();
    }else if(numberOfBottles === ""){
      openToast("약정 통수를 선택해 주십시오", "error");
      $("#numberOfBottles").focus();
    }else if(numberOfDispensers === "") {
      openToast("냉온수기 대수를 선택해 주십시오", "error");
      $("#numberOfDispensers").focus();
    }else */if(nameOfPersonInCharge === ""){
      openToast("담당자명을 입력해 주십시오", "error");
      $("#nameOfPersonInCharge").focus();
    }else if(nameOfCompany === ""){
      openToast("회사명을 입력해 주십시오", "error");
      $("#nameOfCompany").focus();
    }else if(telNumber === ""){
      openToast("연락처를 입력해 주십시오", "error");
      $("#telNumber").focus();
    }/*else if(isNaN(telNumber)){
      openToast("연락처는 숫자만 입력 가능 합니다.", "error");
      $("#telNumber").val("").focus();
    }*/else {
      if (confirm("위의 입력하신 정보로 상담 신청을 하시겠습니까?")) {
        var text="== 신규 상담 신청 접수 ==";

        if(selected_area === ""){
          selected_area_nm = "미입력";
        }

        if(numberOfDispensers === "대"){
          numberOfDispensers = "미입력";
        }

        if(numberOfBottles === "통"){
          numberOfBottles = "미입력";
        }

        text+="\n지역: " + selected_area_nm;
        text+="\n냉온수기 대수: " + numberOfDispensers;
        text+="\n약정 통수: " + numberOfBottles;
        text+="\n담당자명: " + nameOfPersonInCharge;
        text+="\n회사명: " + nameOfCompany;
        text+="\n연락처: " + telNumber;

        storeClient(text);
      }
    }
  });

  $("#telNumber").change(function() {
    if(isNaN(this.value)){
      openToast("연락처는 숫자만 입력 가능 합니다.", "error");
      $("#telNumber").val("").focus();
    }else{
      this.value = phoneNumberFomatter(this.value);
    }
  });

  function storeClient(text){
    var payload = {
      chat_id: "@CryptomatoAlert",
      text: text
    }

    $.ajax ({
        type : "POST",
        url : "https://api.telegram.org/bot6411750970:AAF7Oj5kA3_Xdq61hAoxfCdcVOEE9aejgbQ/sendMessage",
        dataType : 'json',
        contentType : 'application/json',
        data : JSON.stringify(payload),
        success : function(res) {
          openToast("고객님이 입력하신 소중한 정보를 담당자에게 전달 하였습니다. 빠른 시일내에 입력해주신 연락처로 연락 드리겠습니다. 감사합니다.", "success");
        },
        error : function(xhr) {
          openToast(xhr.responseText, "error");
        }
      });
  }

  function phoneNumberFomatter(num,type){

    var formatNum = '';

    if(num.length===11){
      if(type===0){
        formatNum = num.replace(/(\d{3})(\d{4})(\d{4})/, '$1-****-$3');
      }else{
        formatNum = num.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
      }
    }else if(num.length===8){
      formatNum = num.replace(/(\d{4})(\d{4})/, '$1-$2');
    }else{
      if(num.indexOf('02')===0){
        if(type===0){
          formatNum = num.replace(/(\d{2})(\d{4})(\d{4})/, '$1-****-$3');
        }else{
          formatNum = num.replace(/(\d{2})(\d{4})(\d{4})/, '$1-$2-$3');
        }
      }else{
        if(type===0){
          formatNum = num.replace(/(\d{3})(\d{3})(\d{4})/, '$1-***-$3');
        }else{
          formatNum = num.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
        }
      }
    }
    return formatNum;
  }

  function openToast(text, type){
    const Toast = Swal.mixin({
      toast: true,
      showConfirmButton: false,
      timer: 5000,
      timerProgressBar: true,
      didOpen: (toast) => {
        toast.onmouseenter = Swal.stopTimer;
        toast.onmouseleave = Swal.resumeTimer;
      }
    });
    Toast.fire({
      icon: type,
      title: text
    });
  }
</script>
