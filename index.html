        calcResultHtml += '        <img src="images/office.png" alt="사무실 내 생수 설치 사례">';
        calcResultHtml += '      </li>';
        calcResultHtml += '      <li class="splide__slide">';
        calcResultHtml += '        <img src="images/waterguard.png" alt="정기 소독 및 위생 관리 서비스">';
        calcResultHtml += '      </li>';

        calcResultHtml += '        <img src="images/house.png" alt="가정 및 소규모 공간 설치 예시">';

        calcResultHtml += '  <div class="splide__track">';
        calcResultHtml += '    <ul class="splide__list">';
        calcResultHtml += '      <li class="splide__slide">';
        calcResultHtml += '        <img src="images/office.png" alt="사무실 설치 미리보기">';
        calcResultHtml += '      </li>';
        calcResultHtml += '      <li class="splide__slide">';
        calcResultHtml += '        <img src="images/waterguard.png" alt="위생 관리 미리보기">';
        calcResultHtml += '      </li>';
        calcResultHtml += '      <li class="splide__slide">';
        calcResultHtml += '        <img src="images/house.png" alt="가정 설치 미리보기">';
        calcResultHtml += '      </li>';

        calcResultHtml += '  </div>';

  $("#calc_btn").click(function(){

      openNotificationToast("지역을 선택해 주십시오.", "error", $("#areas"));

    }else if(numberOfBottles === ""){
      openNotificationToast("약정 통수를 선택해 주십시오.", "error", $("#numberOfBottles"));
    }else{
      //location.href="#consult_btn";
      openModal(calcResultHtml);
    }
  });

    let numberOfBottles = $("#numberOfBottles option:selected").val() + "통";
    let nameOfPersonInCharge = $("#nameOfPersonInCharge").val();
    let nameOfCompany = $("#nameOfCompany").val();
    let telNumber = $("#telNumber").val();

    /*if(selected_area === ""){
      openNotificationToast("지역을 선택해 주십시오", "error", $("#areas"));
    }else if(numberOfBottles === ""){
      openNotificationToast("약정 통수를 선택해 주십시오", "error", $("#numberOfBottles"));
    }else if(numberOfDispensers === "") {
      openNotificationToast("냉온수기 대수를 선택해 주십시오", "error", $("#numberOfDispensers"));
    }else */if(nameOfPersonInCharge === ""){
      openNotificationToast("담당자명을 입력해 주십시오", "error", $("#nameOfPersonInCharge"));
    }else if(nameOfCompany === ""){
      openNotificationToast("회사명을 입력해 주십시오", "error", $("#nameOfCompany"));
    }else if(telNumber === ""){
      openNotificationToast("연락처를 입력해 주십시오", "error", $("#telNumber"));
    }/*else if(isNaN(telNumber)){
      openNotificationToast("연락처는 숫자만 입력 가능 합니다.", "error", $("#telNumber"));
      $("#telNumber").val("");
    }*/else {
      if (confirm("위의 입력하신 정보로 상담 신청을 하시겠습니까?")) {
        let text="== 신규 상담 신청 접수 ==";

        if(selected_area === ""){
          selected_area_nm = "미입력";
        }

        if(numberOfDispensers === "대"){
          numberOfDispensers = "미입력";
        }

        if(numberOfBottles === "통"){

        text+="\n지역: " + selected_area_nm;

  $("#telNumber").change(function() {
    if(isNaN(this.value)){
      openNotificationToast("연락처는 숫자만 입력 가능 합니다.", "error", $("#telNumber"));
      $("#telNumber").val("").focus();
    }else{
      this.value = phoneNumberFomatter(this.value);
    }
  });

  function storeClient(text){
    let payload = {
      chat_id: "@CryptomatoAlert",
      text: text
    }

    $.ajax ({
        type : "POST",
        url : "https://api.telegram.org/bot6411750970:AAF7Oj5kA3_Xdq61hAoxfCdcVOEE9aejgbQ/sendMessage",
        dataType : 'json',
        contentType : 'application/json',
        data : JSON.stringify(payload),
        success : function(res) {
          openNotificationToast("고객님이 입력하신 소중한 정보를 담당자에게 전달하였습니다. 이른 시일 내에 입력해 주신 연락처로 연락드리겠습니다. 감사합니다.", "success");
        },
        error : function(xhr) {
          openNotificationToast(xhr.responseText, "error");
        }
      });
  }

  function phoneNumberFomatter(num,type){

    let formatNum = '';

    if(num.length===11){
      if(type===0){
        formatNum = num.replace(/(\d{3})(\d{4})(\d{4})/, '$1-****-$3');
      }else{
        formatNum = num.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
      }
    }else if(num.length===8){
      formatNum = num.replace(/(\d{4})(\d{4})/, '$1-$2');
    }else{
      if(num.indexOf('02')===0){
        if(type===0){
          formatNum = num.replace(/(\d{2})(\d{4})(\d{4})/, '$1-****-$3');
        }else{
          formatNum = num.replace(/(\d{2})(\d{4})(\d{4})/, '$1-$2-$3');
        }
      }else{
        if(type===0){
          formatNum = num.replace(/(\d{3})(\d{3})(\d{4})/, '$1-***-$3');
        }else{
          formatNum = num.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
        }
      }
    }
    return formatNum;
  }

  function openNotificationToast(text, type, focusElem){
    let timer = 3000;

    if(type === "success"){
      timer = 6000;
    }

    const Toast = Swal.mixin({
      toast: true,
      showConfirmButton: false,
      showDenyButton: false,
      showCancelButton: false,
      confirmButtonText: "확인",
      cancelButtonText: "취소",
      denyButtonText: "닫기",
      position: "center",
      timer: timer,
      timerProgressBar: true,
      didOpen: (toast) => {
        toast.onmouseenter = Swal.stopTimer;
        toast.onmouseleave = Swal.resumeTimer;
        $(focusElem).focus();
      },
      didClose: (toast) => {
        $(focusElem).focus();
      }
    });
    Toast.fire({
      icon: type,
      title: text
    });
  }

  function openModal(html){
    const Modal = Swal.fire({
      title: "<strong>계산결과</strong>",
      html: html,
      showConfirmButton: true,
      showDenyButton: false,
      showCancelButton: true,
      confirmButtonText: "상담신청",
      cancelButtonText: "취소",
      denyButtonText: "닫기",
      confirmButtonColor: "#2a5298",
      returnFocus: false,
      didOpen: (modal) => {
        let main = new Splide( '#main-carousel', {
          type      : 'fade',
          rewind    : true,
          pagination: false,
          arrows    : false,
        } );

        let thumbnails = new Splide( '#thumbnail-carousel', {
          fixedWidth : 100,
          fixedHeight: 60,
          arrows     : false,
          gap        : 10,
          type       : 'loop',
          perPage    : 3,
          rewind     : true,
          pagination : false,
          focus      : 'center',
          isNavigation: true,
          autoplay : true,
          updateOnMove: true,
          interval: 5000,
          breakpoints: {
            600: {
              fixedWidth : 60,
              fixedHeight: 44,
            },
          }
        });

        main.sync( thumbnails );
        main.mount();
        thumbnails.mount();
      }
    }).then((result) => {
      if (result.isConfirmed){
        $("#nameOfPersonInCharge").focus();
      }
    });
  }
</script>
