<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>워터 코리아</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="container nav">
    <div class="logo">
      워터 코리아
    </div>
    <!-- <nav class="menu">
      <a href="#">회사소개</a>
      <a href="#">서비스 안내</a>
      <a href="#">요금계산기</a>
      <a href="#">조직 소개</a>
    </nav> -->
  </div>
</header>

<section class="hero">
  <div class="overlay">
    <div class="container hero-content" style="text-align: center;">
      <h1>비즈니스 생수 플랫폼<br><span>생수 배송 서비스</span></h1>
      <p>냉온수기 무료 설치, 경기배송 전문</p>

      <div class="calculator">
        <h3>월요금 미리보기 간편계산기 ▶</h3>
        <div class="calc-row">
          <select>
            <option>지역 선택</option>
          </select>
          <select>
            <option>냉온수기 대수</option>
          </select>
          <select>
            <option>약정 통수</option>
          </select>
        </div>
        <button>월 예상 요금 계산하기 ▶</button>
      </div>
    </div>
  </div>
</section>

<section class="features">
  <div class="container feature-grid">

    <div class="feature">
      <div class="icon">🤝</div>
      <h4>냉온수기 두아레마</h4>
      <p>설치비 전액 무료<br>빠른 A/S 가능</p>
    </div>

    <div class="feature">
      <div class="icon"> <img src="waterguard.png" alt="정기 소독 아이콘"/></div>
      <h4>자동 정기배송</h4>
      <p>탑모델 냉온수기<br>자동 정기 배송</p>
    </div>

    <div class="feature">
      <div class="icon">🛡️</div>
      <h4>정기 소독</h4>
      <p>정수 재질관리<br>생수 기능 점검</p>
    </div>

    <div class="feature">
      <div class="icon">📄</div>
      <h4>간편 전자서 만들기</h4>
      <p>서명절 간편 서류<br>간편 계약서 전달</p>
    </div>

  </div>
</section>

<section class="consult">
  <div class="container consult-box">
    <h2>초고속 상담 신청</h2>
    <p>지금 바로 설치 및 정기배송 상담을 신청하세요!</p>

    <div class="form">
      <input type="text" placeholder="업체명">
      <input type="text" placeholder="연락처">
      <select>
        <option>설치 지역</option>
      </select>
    </div>

    <button class="consult-btn">초고속 상담신청 ▶</button>
  </div>
</section>

<footer class="footer">
  <div class="container footer-inner">
    <div>💧 간본베이스</div>
    <div>상담시간 : 평일 8:30 ~ 18:00</div>
    <div>Copyright © 간본베이스</div>
  </div>
</footer>

<div class="chat-btn">실시간 상담</div>

</body>
</html>
